<div class="filter-bar">
    <div class="filter-bar-search">
        <i class="bi bi-search"></i>
        <input type="text" data-search-input placeholder="Cari konten..." aria-label="Cari konten">
    </div>
    <select data-sort-select class="sort-select" aria-label="Urutkan">
        <option value="default">Default</option>
        <option value="title-asc">Title A-Z</option>
        <option value="title-desc">Title Z-A</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="rating-desc">Rating</option>
    </select>
    <span class="result-count" data-result-count></span>
    <div class="filter-loading-spinner" style="display:none;"></div>
</div>
